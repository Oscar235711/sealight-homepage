<style>
/* ── tokens.css ── */
/* ============================================================
   SEALIGHT v04 · Design Tokens
   3 tonal modes: midnight / daylight / hybrid
   Type pairing: Space Grotesk (display) + Inter (text) + JetBrains Mono (spec)
   ============================================================ */

:root {
  /* brand constants */
  --brand-orange: #FF6600;
  --brand-orange-2: #FF8A3D;
  --brand-orange-deep: #CC4F00;

  /* typography */
  --font-display: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-text: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

  --track-display: -0.028em;
  --track-h2: -0.022em;
  --track-body: -0.003em;
  --track-eyebrow: 0.18em;

  /* radii / shadows */
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;
  --shadow-soft: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px -12px rgba(0,0,0,.12);
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 16px 40px -16px rgba(0,0,0,.16);
  --shadow-lift: 0 30px 60px -30px rgba(0,0,0,.35);

  /* motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 220ms;
  --dur: 360ms;
  --dur-slow: 600ms;
}

/* ── Midnight (DJI-like cinematic) ── */
[data-tone="midnight"] {
  --bg:        #0B0C0E;
  --bg-2:      #121418;
  --bg-3:      #1A1D22;
  --surface:   #14171C;
  --line:      rgba(255,255,255,0.08);
  --line-2:    rgba(255,255,255,0.14);
  --fg:        #F4F4F2;
  --fg-2:      rgba(244,244,242,0.72);
  --fg-3:      rgba(244,244,242,0.50);
  --accent:    #FF6600;
  --accent-soft: rgba(255,102,0,0.14);
  --success:   #6DE07A;
}

/* ── Daylight (Velotric / Kwikset editorial) ── */
[data-tone="daylight"] {
  --bg:        #F7F5F1;
  --bg-2:      #EFECE6;
  --bg-3:      #E6E1D9;
  --surface:   #FFFFFF;
  --line:      rgba(15,15,15,0.08);
  --line-2:    rgba(15,15,15,0.16);
  --fg:        #111213;
  --fg-2:      rgba(17,18,19,0.68);
  --fg-3:      rgba(17,18,19,0.45);
  --accent:    #FF6600;
  --accent-soft: rgba(255,102,0,0.10);
  --success:   #0F8F4A;
}

/* ── Hybrid (deep hero, light product, deep UGC) ── */
[data-tone="hybrid"] {
  --bg:        #F7F5F1;
  --bg-2:      #EFECE6;
  --bg-3:      #0B0C0E;
  --surface:   #FFFFFF;
  --line:      rgba(15,15,15,0.08);
  --line-2:    rgba(15,15,15,0.16);
  --fg:        #111213;
  --fg-2:      rgba(17,18,19,0.68);
  --fg-3:      rgba(17,18,19,0.45);
  --accent:    #FF6600;
  --accent-soft: rgba(255,102,0,0.10);
  --success:   #0F8F4A;
}

/* ── Base resets scoped to prototype ── */
.sl-root, .sl-root * { box-sizing: border-box; }
.sl-root {
  font-family: var(--font-text);
  color: var(--fg);
  background: var(--bg);
  letter-spacing: var(--track-body);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.sl-root h1, .sl-root h2, .sl-root h3, .sl-root h4 {
  font-family: var(--font-display);
  letter-spacing: var(--track-display);
  line-height: 1.04;
  font-weight: 700;
  margin: 0;
  text-wrap: balance;
}
.sl-root p { margin: 0; }
.sl-root a { color: inherit; text-decoration: none; }
.sl-root button { font: inherit; border: 0; background: transparent; cursor: pointer; color: inherit; }
.sl-root ul { list-style: none; margin: 0; padding: 0; }
.sl-root img, .sl-root svg { display: block; max-width: 100%; }

.sl-eyebrow {
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: var(--track-eyebrow);
  font-size: 11px;
  font-weight: 500;
  color: var(--fg-3);
}
.sl-mono {
  font-family: var(--font-mono);
  letter-spacing: 0;
  font-variant-numeric: tabular-nums;
}

/* ── components.css ── */
/* =============================================================
   SEALIGHT v04 · Shared prototype components (buttons, cards, etc)
   All selectors are scoped under .sl-root to avoid colliding with
   design canvas chrome.
   ============================================================= */

/* Buttons */
.sl-root .btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px; min-height: 44px;
  font-family: var(--font-text);
  font-size: 14px; font-weight: 600; letter-spacing: -0.002em;
  border-radius: 999px;
  transition: background var(--dur) var(--ease-out),
              color var(--dur) var(--ease-out),
              border-color var(--dur) var(--ease-out),
              transform var(--dur) var(--ease-out),
              box-shadow var(--dur) var(--ease-out);
  border: 1px solid transparent;
  white-space: nowrap;
}
.sl-root .btn-primary { background: var(--accent); color: #fff; }
.sl-root .btn-primary:hover { background: var(--brand-orange-deep); box-shadow: 0 10px 30px -10px rgba(255,102,0,.55); transform: translateY(-1px); }
.sl-root .btn-dark { background: var(--fg); color: var(--bg); }
.sl-root .btn-dark:hover { transform: translateY(-1px); }
.sl-root .btn-outline { border-color: var(--line-2); color: var(--fg); background: transparent; }
.sl-root .btn-outline:hover { background: var(--fg); color: var(--bg); }
.sl-root .btn-outline-inv { border-color: rgba(255,255,255,.4); color: #fff; background: transparent; }
.sl-root .btn-outline-inv:hover { background: #fff; color: #0B0C0E; }
.sl-root .btn-ghost { padding: 12px 2px; border-radius: 0; border-bottom: 1px solid currentColor; color: var(--fg); }
.sl-root .btn-ghost:hover { color: var(--accent); }
.sl-root .btn-sm { padding: 9px 14px; font-size: 13px; min-height: 38px; }
.sl-root .btn-lg { padding: 16px 26px; font-size: 15px; min-height: 52px; }
.sl-root .btn svg { width: 16px; height: 16px; }

/* Section */
.sl-root section { position: relative; }
.sl-root .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
.sl-root .section-pad { padding: 112px 0; }
.sl-root .section-pad-sm { padding: 72px 0; }

/* Section header */
.sl-root .sec-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; margin-bottom: 56px; }
.sl-root .sec-head h2 { font-size: clamp(28px, 3.8vw, 56px); letter-spacing: var(--track-display); max-width: 18ch; }
.sl-root .sec-head .sec-kicker { display: flex; flex-direction: column; gap: 10px; }
.sl-root .sec-head .sec-kicker p { max-width: 44ch; color: var(--fg-2); font-size: 16px; line-height: 1.55; }
.sl-root .sec-head-center { flex-direction: column; text-align: center; align-items: center; }
.sl-root .sec-head-center .sec-kicker { align-items: center; }

/* Chip */
.sl-root .chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--accent-soft); color: var(--accent);
}
.sl-root .chip-dot::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; display: inline-block;
}

/* Image placeholder */
.sl-root .img-ph {
  position: relative; overflow: hidden; border-radius: var(--radius);
  background-color: var(--bg-3);
  background-image:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.04) 0, rgba(255,255,255,0.04) 1px,
      transparent 1px, transparent 8px),
    linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 100%);
  display: flex; align-items: center; justify-content: center;
}
.sl-root [data-tone="daylight"] .img-ph,
.sl-root .img-ph[data-theme="light"] {
  background-image:
    repeating-linear-gradient(135deg,
      rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px,
      transparent 1px, transparent 8px),
    linear-gradient(180deg, #EAE5DC 0%, #DCD5C8 100%);
}
.sl-root .img-ph .ph-label {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--fg-3);
  padding: 6px 10px; border: 1px dashed var(--line-2);
  border-radius: 6px;
  background: rgba(0,0,0,0.15);
  letter-spacing: 0.02em;
}
.sl-root [data-tone="daylight"] .img-ph .ph-label,
.sl-root .img-ph[data-theme="light"] .ph-label { background: rgba(255,255,255,.6); color: rgba(0,0,0,.55); }

/* Trust/marquee bar */
.sl-root .hairline-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.sl-root .hairline-row > * {
  padding: 22px 24px; border-left: 1px solid var(--line);
  display: flex; gap: 14px; align-items: flex-start;
}
.sl-root .hairline-row > *:first-child { border-left: 0; }
.sl-root .hairline-row strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 3px; }
.sl-root .hairline-row span { font-size: 12px; color: var(--fg-2); line-height: 1.4; }

/* Tag */
.sl-root .tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  border: 1px solid var(--line-2);
  color: var(--fg-2);
  font-family: var(--font-mono);
  letter-spacing: 0;
}

/* Divider with label */
.sl-root .rule-label {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.12em;
}
.sl-root .rule-label::before,
.sl-root .rule-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

/* Scroll marquee (logos / trust) */
@keyframes sl-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.sl-root .marquee { overflow: hidden; }
.sl-root .marquee-track { display: flex; width: max-content; gap: 56px; animation: sl-marquee 40s linear infinite; }
.sl-root .marquee-track > * { flex-shrink: 0; }

/* Fade in on appear */
.sl-root .fade-up { opacity: 0; transform: translateY(20px); transition: opacity .6s var(--ease-out), transform .6s var(--ease-out); }
.sl-root .fade-up.in { opacity: 1; transform: translateY(0); }

/* ── nav-variants.css ── */
/* SEALIGHT v04 · Navigation variants (A/B/C) */

.sl-root .nav-shell { position: sticky; top: 0; z-index: 40; }

/* ─── Nav A · Mega by Need ────────────────────────────── */
.sl-root .navA { background: var(--bg); border-bottom: 1px solid var(--line); }
.sl-root .navA-top {
  display: flex; align-items: center; gap: 24px;
  height: 64px; max-width: 1280px; margin: 0 auto; padding: 0 32px;
}
.sl-root .navA-logo { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.04em; font-size: 22px; }
.sl-root .navA-logo em { color: var(--accent); font-style: normal; }
.sl-root .navA-links { display: flex; gap: 4px; flex: 1; margin-left: 24px; }
.sl-root .navA-link {
  padding: 8px 14px; font-size: 14px; font-weight: 500; color: var(--fg-2);
  border-radius: 8px; display: inline-flex; align-items: center; gap: 4px;
  transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
  cursor: pointer;
}
.sl-root .navA-link:hover, .sl-root .navA-link.open { color: var(--fg); background: var(--bg-2); }
.sl-root .navA-link svg { width: 10px; height: 10px; opacity: .5; }
.sl-root .navA-right { display: flex; align-items: center; gap: 12px; }
.sl-root .navA-fit {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 8px 6px 14px; border: 1px solid var(--line-2); border-radius: 999px;
  font-size: 13px; color: var(--fg-2);
}
.sl-root .navA-fit strong { color: var(--fg); font-weight: 600; }
.sl-root .navA-fit .go {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
}

.sl-root .navA-mega {
  position: absolute; left: 0; right: 0; top: 100%;
  background: var(--bg); border-bottom: 1px solid var(--line);
  padding: 36px 0 44px;
  animation: sl-mega-in .3s var(--ease-out);
}
@keyframes sl-mega-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.sl-root .navA-mega-grid { display: grid; grid-template-columns: repeat(3, 1fr) 1.1fr; gap: 36px; }
.sl-root .navA-col h5 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; color: var(--fg-3); text-transform: uppercase; margin-bottom: 14px; font-weight: 500; }
.sl-root .navA-col ul { display: flex; flex-direction: column; gap: 2px; }
.sl-root .navA-col li a {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 14px; color: var(--fg);
  transition: background .2s;
}
.sl-root .navA-col li a:hover { background: var(--bg-2); color: var(--accent); }
.sl-root .navA-col li a .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }

.sl-root .navA-feature {
  background: var(--bg-2); border-radius: var(--radius);
  padding: 18px; display: flex; flex-direction: column; gap: 12px;
}
.sl-root .navA-feature .img-ph { aspect-ratio: 16/10; border-radius: 10px; }
.sl-root .navA-feature h6 { font-family: var(--font-display); font-size: 15px; font-weight: 600; }
.sl-root .navA-feature p { font-size: 12px; color: var(--fg-2); line-height: 1.5; }

/* ─── Nav B · Fitment-first sticky bar ────────────────── */
.sl-root .navB { background: var(--bg); border-bottom: 1px solid var(--line); }
.sl-root .navB-top { height: 60px; display: flex; align-items: center; max-width: 1280px; margin: 0 auto; padding: 0 32px; gap: 32px; }
.sl-root .navB-top .navA-logo { font-size: 20px; }
.sl-root .navB-top ul { display: flex; gap: 28px; margin-left: 16px; flex: 1; }
.sl-root .navB-top ul a { font-size: 13px; color: var(--fg-2); font-weight: 500; }
.sl-root .navB-top ul a:hover { color: var(--accent); }
.sl-root .navB-bar {
  background: var(--bg-2); border-top: 1px solid var(--line);
  padding: 14px 0;
}
.sl-root .navB-bar-inner {
  max-width: 1280px; margin: 0 auto; padding: 0 32px;
  display: grid; grid-template-columns: auto 1fr 1fr 1fr auto auto; gap: 10px; align-items: center;
}
.sl-root .navB-label {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3); padding-right: 14px; border-right: 1px solid var(--line); margin-right: 4px;
}
.sl-root .navB-pick {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border: 1px solid var(--line); border-radius: 10px;
  background: var(--surface); cursor: pointer;
  font-size: 13px; font-weight: 500;
  transition: border-color .2s;
}
.sl-root .navB-pick:hover { border-color: var(--accent); }
.sl-root .navB-pick .navB-pick-label { color: var(--fg-3); font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .1em; }
.sl-root .navB-pick .navB-pick-val { color: var(--fg); display: flex; align-items: center; justify-content: space-between; }
.sl-root .navB-pick .caret { width: 10px; height: 10px; opacity: .5; }
.sl-root .navB-hint { font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); }

/* ─── Nav C · Minimal + Drawer ───────────────────────── */
.sl-root .navC { background: transparent; position: absolute; top: 0; left: 0; right: 0; z-index: 40; }
.sl-root .navC.on-light { color: var(--fg); }
.sl-root .navC.on-dark { color: #fff; }
.sl-root .navC-top { height: 72px; display: flex; align-items: center; max-width: 1280px; margin: 0 auto; padding: 0 32px; gap: 24px; }
.sl-root .navC-top ul { display: flex; gap: 36px; flex: 1; justify-content: center; }
.sl-root .navC-top ul a { font-size: 13px; font-weight: 500; opacity: .75; letter-spacing: 0; }
.sl-root .navC-top ul a:hover { opacity: 1; color: var(--accent); }
.sl-root .navC-cta {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 8px 10px 18px; border: 1px solid currentColor; opacity: .8;
  border-radius: 999px; font-size: 13px; font-weight: 500;
  transition: all .3s var(--ease-out);
}
.sl-root .navC-cta:hover { opacity: 1; background: var(--accent); color: #fff; border-color: var(--accent); }
.sl-root .navC-cta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.sl-root .navC-drawer-hint {
  position: absolute; top: 72px; right: 32px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em;
  text-transform: uppercase; opacity: .5;
}

/* Miniature drawer overlay preview (tucked into Nav C hero) */
.sl-root .navC-drawer {
  position: absolute; top: 0; right: 0; bottom: 0; width: 38%;
  background: var(--surface); color: var(--fg);
  padding: 96px 32px 32px; display: flex; flex-direction: column; gap: 20px;
  box-shadow: -40px 0 80px -30px rgba(0,0,0,.5);
  border-left: 1px solid var(--line);
  transform: translateX(0);
}
.sl-root .navC-drawer h4 { font-family: var(--font-display); font-size: 22px; }
.sl-root .navC-drawer p { font-size: 13px; color: var(--fg-2); }
.sl-root .navC-drawer .navB-pick { background: var(--bg); }

/* ── hero-variants.css ── */
/* SEALIGHT v04 · Hero variants */

/* ─── Hero 1 · Cinematic Beam ───────────────────── */
.sl-root .hero1 {
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse 80% 70% at 65% 40%, rgba(255,102,0,.13) 0%, transparent 55%),
              linear-gradient(180deg, #111418 0%, #0A0B0E 100%);
  color: #fff;
  padding: 120px 0 100px;
  min-height: 720px;
}
.sl-root .hero1 .container { position: relative; z-index: 2; }
.sl-root .hero1-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 72px; align-items: center; }
.sl-root .hero1 .sl-eyebrow { color: var(--brand-orange-2); margin-bottom: 20px; }
.sl-root .hero1 h1 {
  font-size: clamp(44px, 6.2vw, 84px);
  font-weight: 700; letter-spacing: -0.03em; line-height: 0.98;
  margin-bottom: 26px; color: #fff;
}
.sl-root .hero1 h1 em { color: var(--brand-orange-2); font-style: normal; }
.sl-root .hero1 .hero1-sub { font-size: 18px; color: rgba(255,255,255,.72); max-width: 500px; margin-bottom: 36px; font-weight: 300; line-height: 1.55; }
.sl-root .hero1-fitment {
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px; padding: 18px; backdrop-filter: blur(12px) saturate(1.2);
  box-shadow: 0 20px 60px -20px rgba(0,0,0,.6);
}
.sl-root .hero1-fitment .label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.55); margin-bottom: 12px; }
.sl-root .hero1-fitment .row { display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 8px; }

/* ── modules.css ── */
/* SEALIGHT v04 · Shared modules — product cards, UGC, support */

/* Sticky sub-nav under hero */
.sl-root .subnav { position: sticky; top: 64px; z-index: 20; background: var(--bg); border-bottom: 1px solid var(--line); }
.sl-root .subnav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; gap: 28px; height: 52px; align-items: center; overflow-x: auto; }
.sl-root .subnav a { font-size: 13px; font-weight: 500; color: var(--fg-2); white-space: nowrap; padding: 6px 0; border-bottom: 2px solid transparent; }
.sl-root .subnav a.active { color: var(--fg); border-color: var(--accent); }

/* Scene strip */
.sl-root .scene-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 16px; }
.sl-root .scene-card { position: relative; aspect-ratio: 4/5; border-radius: var(--radius); overflow: hidden; background: var(--bg-3); cursor: pointer; transition: transform .5s var(--ease-out); }
.sl-root .scene-card.featured { aspect-ratio: 4/5; }
.sl-root .scene-card:hover { transform: translateY(-4px); }
.sl-root .scene-card .bg { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(255,102,0,.3), rgba(0,0,0,.0)), linear-gradient(180deg, #1B1D22 0%, #0C0D10 100%); }
.sl-root .scene-card.featured .bg { background: radial-gradient(ellipse 70% 50% at 60% 40%, rgba(255,150,60,.35), transparent 60%), linear-gradient(180deg, #15171B 0%, #06070A 100%); }
.sl-root .scene-card .mask { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,.8) 100%); }
.sl-root .scene-card .body { position: absolute; inset: 0; padding: 22px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; }
.sl-root .scene-card h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #fff; line-height: 1.1; max-width: 14ch; }
.sl-root .scene-card.featured h3 { font-size: 34px; max-width: 16ch; }
.sl-root .scene-card p { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 8px; max-width: 28ch; }
.sl-root .scene-card .tag { color: #fff; border-color: rgba(255,255,255,.25); align-self: flex-start; }
.sl-root .scene-card .cta-arrow { display: inline-flex; gap: 6px; align-items: center; font-size: 13px; font-weight: 500; color: #fff; }

/* Product series cards */
.sl-root .series-rail { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.sl-root .series-card {
  position: relative; border-radius: var(--radius); overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--line);
  padding: 22px;
  display: flex; flex-direction: column; gap: 14px;
  transition: border-color var(--dur) var(--ease-out), transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
}
.sl-root .series-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: var(--shadow-lift); }
.sl-root .series-card.popular { border-color: var(--accent); }
.sl-root .series-card .popular-flag { position: absolute; top: 14px; right: 14px; z-index: 2; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--accent); background: var(--surface); border: 1px solid var(--accent); padding: 3px 8px; border-radius: 4px; }
.sl-root .series-card .img-ph { aspect-ratio: 1/1; border-radius: 10px; }
.sl-root .series-card h3 { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.sl-root .series-card .tagline { font-size: 13px; color: var(--fg-2); }
.sl-root .series-card .specs { display: flex; flex-direction: column; gap: 6px; padding: 10px 0; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line); }
.sl-root .series-card .specs li { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 12px; color: var(--fg-2); font-family: var(--font-mono); }
.sl-root .series-card .specs li b { color: var(--fg); font-weight: 600; }
.sl-root .series-card .bar { flex: 1; height: 4px; background: var(--bg-2); border-radius: 2px; margin: 0 8px; position: relative; }
.sl-root .series-card .bar i { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 2px; }
.sl-root .series-card .price { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
.sl-root .series-card .price b { color: var(--fg); font-size: 15px; font-weight: 700; letter-spacing: 0; }

/* Before/After */
.sl-root .ba-wrap {
  position: relative; border-radius: var(--radius-lg); overflow: hidden;
  aspect-ratio: 21/9; background: #000;
}
.sl-root .ba-half { position: absolute; inset: 0; }
.sl-root .ba-half.before { background: radial-gradient(ellipse 40% 30% at 50% 45%, rgba(255,220,120,.35), transparent 60%), #191611; clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }
.sl-root .ba-half.after { background: radial-gradient(ellipse 55% 40% at 50% 45%, rgba(255,240,220,.85) 0%, rgba(255,180,100,.35) 30%, transparent 60%), #080A0C; clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); }
.sl-root .ba-divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(255,255,255,.8); transform: translateX(-50%); }
.sl-root .ba-divider::after { content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 36px; height: 36px; border-radius: 50%; background: #fff; }
.sl-root .ba-label { position: absolute; bottom: 16px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; padding: 5px 10px; border-radius: 4px; }
.sl-root .ba-label.left { left: 16px; background: rgba(0,0,0,.5); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.15); }
.sl-root .ba-label.right { right: 16px; background: var(--accent); color: #fff; }

/* UGC reviews */
.sl-root .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.sl-root .review-card { padding: 22px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); display: flex; flex-direction: column; gap: 14px; }
.sl-root .review-card.dark { background: var(--bg-2); color: #fff; }
.sl-root .review-card .img-ph { aspect-ratio: 4/3; border-radius: 10px; }
.sl-root .review-card .stars { color: var(--accent); letter-spacing: 2px; font-size: 13px; }
.sl-root .review-card blockquote { font-size: 14px; line-height: 1.55; }
.sl-root .review-card .meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); }
.sl-root .review-card.dark .meta { color: rgba(255,255,255,.5); }

/* Footer */
.sl-root .site-footer { background: var(--bg); border-top: 1px solid var(--line); padding: 72px 0 36px; }
.sl-root .site-footer .cols { display: grid; grid-template-columns: 2fr repeat(4, 1fr); gap: 40px; margin-bottom: 48px; }
.sl-root .site-footer h5 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 14px; font-weight: 500; }
.sl-root .site-footer ul { display: flex; flex-direction: column; gap: 8px; }
.sl-root .site-footer ul a { font-size: 13px; color: var(--fg-2); }
.sl-root .site-footer ul a:hover { color: var(--accent); }
.sl-root .site-footer .brand p { font-size: 13px; color: var(--fg-2); max-width: 34ch; line-height: 1.55; margin-top: 14px; }
.sl-root .site-footer .legal { border-top: 1px solid var(--line); padding-top: 20px; display: flex; justify-content: space-between; color: var(--fg-3); font-size: 12px; font-family: var(--font-mono); letter-spacing: .04em; }

/* Breadcrumbs for secondary pages */
.sl-root .crumbs { display: flex; gap: 10px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-3); }
.sl-root .crumbs a { color: var(--fg-2); }
.sl-root .crumbs span { opacity: .4; }


/* ── v05 page chrome ── */
html, body { margin: 0; background: #F7F5F1; overflow-x: hidden; }
body { max-width: 100vw; }
#root { min-height: 100vh; }

/* ── responsive (mobile, ≤ 900px) ── */
@media (max-width: 900px) {
  .sl-root .container { padding-left: 20px !important; padding-right: 20px !important; }
  .sl-root .section-pad,
  .sl-root .section-pad-sm { padding-top: 56px; padding-bottom: 56px; }

  /* Nav B */
  .sl-root .navB-top { flex-wrap: wrap; gap: 12px; padding: 14px 20px !important; }
  .sl-root .navB-top ul { display: none; }
  .sl-root .navB-bar { padding: 12px 0; }
  .sl-root .navB-bar-inner { flex-wrap: wrap; gap: 8px; padding: 0 20px !important; }
  .sl-root .navB-pick { flex: 1 1 calc(50% - 4px); min-width: 0; }
  .sl-root .navB-label { flex-basis: 100%; }
  .sl-root .navB-hint { display: none; }

  /* Hero 3 fitment row */

  React.useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    let dragging = false;

    const setFromClient = (clientX) => {
      const r = el.getBoundingClientRect();
      const p = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));
      setPos(p);
    };

    const onDown = (e) => {
      dragging = true;
      if (e.pointerId != null) {
        try { el.setPointerCapture(e.pointerId); } catch {}
      }
      setFromClient(e.clientX);
      e.preventDefault();
    };
    const onMove = (e) => {
      if (!dragging) return;
      setFromClient(e.clientX);
    };
    const onUp = () => { dragging = false; };
    const onKey = (e) => {
      if (e.key === 'ArrowLeft')  { setPos(p => Math.max(0, p - 2)); e.preventDefault(); }
      if (e.key === 'ArrowRight') { setPos(p => Math.min(100, p + 2)); e.preventDefault(); }
    };

    el.addEventListener('pointerdown', onDown);
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
    el.addEventListener('pointercancel', onUp);
    el.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    el.addEventListener('keydown', onKey);

    return () => {
      el.removeEventListener('pointerdown', onDown);
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      el.removeEventListener('pointercancel', onUp);
      el.removeEventListener('mousedown', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      el.removeEventListener('keydown', onKey);
    };
  }, []);

  return (
    <section className="section-pad-sm" style={{ background: 'var(--bg-2)', padding: '56px 0' }}>
      <div className="container">
        <div
          className="ba-wrap"
          ref={wrapRef}
          role="slider"
          aria-label="Before and after comparison"
          aria-valuemin={0} aria-valuemax={100} aria-valuenow={Math.round(pos)}
          tabIndex={0}
          style={{ touchAction: 'none', cursor: 'ew-resize', userSelect: 'none' }}
        >
          <div className="ba-half before" style={{ clipPath: `polygon(0 0, ${pos}% 0, ${pos}% 100%, 0 100%)` }} />
          <div className="ba-half after"  style={{ clipPath: `polygon(${pos}% 0, 100% 0, 100% 100%, ${pos}% 100%)` }} />
          <div className="ba-divider" style={{ left: pos + '%' }} />
          <div className="ba-label left">BEFORE · FACTORY HALOGEN</div>
          <div className="ba-label right">SEALIGHT SCOPARC S7S</div>
        </div>
        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 12, color: 'var(--fg-3)', fontFamily: 'var(--font-mono)', letterSpacing: '.08em', textTransform: 'uppercase' }}>

        </div>
      </div>
    </section>
  );
